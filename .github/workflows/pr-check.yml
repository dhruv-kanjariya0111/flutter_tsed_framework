name: PR Quality Gate

on:
  pull_request:
    branches: [main, develop]

jobs:
  flutter:
    name: Flutter Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          cache: true
      - name: Install dependencies
        run: cd frontend && flutter pub get
      - name: Generate code
        run: cd frontend && dart run build_runner build --delete-conflicting-outputs
      - name: Analyze
        run: cd frontend && flutter analyze --fatal-infos
      - name: Test with coverage
        run: cd frontend && flutter test --coverage
      - name: Coverage check
        run: |
          LINES=$(lcov --summary frontend/coverage/lcov.info 2>&1 | grep "lines" | grep -oP '\d+\.\d+(?=%)')
          echo "Coverage: $LINES%"
          [ $(echo "$LINES >= 85" | bc) -eq 1 ] || (echo "FAIL: Coverage below 85%" && exit 1)

  backend:
    name: Backend Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: cd backend && npm ci
      - name: Lint
        run: cd backend && npm run lint
      - name: Test
        run: cd backend && npm run test
      - name: Validate OpenAPI
        run: cd backend && npm run openapi:validate
