name: PR Quality Gate

on:
  pull_request:
    branches: [main, develop]

jobs:
  flutter:
    name: Flutter Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          cache: true
      - name: Install dependencies
        run: cd frontend && flutter pub get
      - name: Generate code
        run: cd frontend && dart run build_runner build --delete-conflicting-outputs
      - name: Analyze
        run: cd frontend && flutter analyze --fatal-infos
      - name: Test with coverage
        run: cd frontend && flutter test --coverage
      - name: Coverage check
        run: |
          LINES=$(lcov --summary frontend/coverage/lcov.info 2>&1 | grep "lines" | grep -oP '\d+\.\d+(?=%)')
          echo "Coverage: $LINES%"
          [ $(echo "$LINES >= 85" | bc) -eq 1 ] || (echo "FAIL: Coverage below 85%" && exit 1)
      - name: Coverage delta (warn on untested changed files)
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          git diff --name-only $BASE_SHA HEAD -- 'frontend/lib/**/*.dart' > /tmp/changed_dart.txt 2>/dev/null || \
            git diff --name-only $BASE_SHA HEAD | grep '^frontend/lib/.*\.dart$' > /tmp/changed_dart.txt || true
          if [ -s /tmp/changed_dart.txt ]; then
            echo "Changed Dart files in this PR:"
            cat /tmp/changed_dart.txt
            MISSING=0
            while IFS= read -r f; do
              rel="${f#frontend/}"
              if ! grep -q "$rel" frontend/coverage/lcov.info 2>/dev/null; then
                echo "WARNING: $f has no coverage data — may be untested"
                MISSING=$((MISSING + 1))
              fi
            done < /tmp/changed_dart.txt
            if [ $MISSING -gt 0 ]; then
              echo "::warning::$MISSING changed file(s) have no coverage data. Add tests to maintain coverage."
            fi
          fi

  backend:
    name: Backend Quality Gate
    runs-on: ubuntu-latest
    env:
      BACKEND_DIR: ${{ vars.BACKEND_DIR || 'backend' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ vars.BACKEND_DIR || 'backend' }}/package-lock.json
      - name: Install dependencies
        run: cd $BACKEND_DIR && npm ci
      - name: Lint
        run: cd $BACKEND_DIR && npm run lint
      - name: Test
        run: cd $BACKEND_DIR && npm run test
      - name: Validate OpenAPI
        run: cd $BACKEND_DIR && npm run openapi:validate
