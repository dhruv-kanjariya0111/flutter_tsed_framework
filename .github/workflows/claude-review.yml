name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Claude Review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          review_type: full
          custom_instructions: |
            Review against the framework rules in .claude/rules/.
            Read MEMORY.md for accumulated review lessons — flag any repeated issues.
            Read BUG_PATTERNS.md for known failure patterns (PATTERN-001 through end).
            Focus on: architecture layer violations, missing Semantics, hardcoded colors/spacing,
            missing error/empty/loading states, performance anti-patterns, security issues.
            Verdict must be: APPROVE | PASS_WITH_WARNINGS | FAIL.
