name: frontend
description: Flutter frontend — generated by Flutter x Ts.ED Framework
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  hooks_riverpod: ^2.5.1

  # Routing
  go_router: ^14.0.0

  # HTTP
  dio: ^5.4.3

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # Caching
  cached_network_image: ^3.3.1

  # Code generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Environment
  flutter_dotenv: ^5.1.0

  # UI
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_animate: ^4.5.0

  # i18n
  intl: ^0.19.0

  # Analytics (choose one — comment out others)
  firebase_analytics: ^11.0.0
  firebase_crashlytics: ^4.0.0
  firebase_auth: ^5.0.0

  # Feature Flags
  firebase_remote_config: ^5.0.0

  # Store
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10
  mocktail: ^1.0.3
  patrol: ^3.6.0

flutter:
  uses-material-design: true
  generate: true  # Required for flutter gen-l10n

  assets:
    - assets/icons/
    - assets/images/
    - assets/animations/
    - .env.dev
    - .env.staging
    - .env.prod

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon_1024.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/icon_foreground.png"

flutter_native_splash:
  color: "#6750A4"
  image: assets/images/splash_logo.png
  android: true
  ios: true
  fullscreen: false
